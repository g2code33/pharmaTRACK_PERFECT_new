name: "Build & Release PharmaTRACK"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Step 1: Build the Windows Version First
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      
      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - run: npm install --legacy-peer-deps
      - run: npm run build
      
      - name: Build Windows App
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: "PharmaTRACK v__VERSION__"
          releaseDraft: true
          prerelease: false

  # Step 2: Build Ubuntu App and Generate the Flawless updater.json
  build-linux-and-release:
    needs: build-windows
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm install --legacy-peer-deps
      - run: npm run build

      - name: Build Linux App
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: "PharmaTRACK v__VERSION__"
          releaseDraft: true
          prerelease: false

      # Read the exact cryptographic signatures generated locally and remotely
      - name: Generate Unified Manifest with Real Signatures
        env:
          APP_VER: ${{ needs.build-windows.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LINUX_SIG=$(cat src-tauri/target/release/bundle/deb/*.deb.sig || echo "")
          WIN_SIG=$(curl -sH "Authorization: token $GH_TOKEN" "https://github.com{{ github.repository }}/releases" | jq -r '..assets[] | select(.name | endswith(".msi.sig")) | .browser_download_url' | xargs curl -sL)

          cat << EOF > updater.json
          {
            "version": "$APP_VER",
            "platforms": {
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com{APP_VER}_x64_en-US.msi"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "https://github.com{APP_VER}_amd64.deb"
              }
            }
          }
          EOF

      # Explicitly upload the completed updater.json map file to the draft release
      - name: Upload Manifest Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.version }}
          files: updater.json
          draft: true
