name: "Build & Release PharmaTRACK"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Step 1: Build the Windows Version First
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      
      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - run: npm install --legacy-peer-deps
      - run: npm run build
      
      - name: Build Windows App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          tagName: v__VERSION__
          releaseName: "PharmaTRACK v__VERSION__"
          releaseDraft: true
          prerelease: false

  # Step 2: Build Ubuntu App and Generate the Flawless updater.json
  build-linux-and-release:
    needs: build-windows
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm install --legacy-peer-deps
      - run: npm run build

      - name: Build Linux App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          tagName: v__VERSION__
          releaseName: "PharmaTRACK v__VERSION__"
          releaseDraft: true
          prerelease: false

            # Flawless Fix: Uses authenticated Bearer headers to safely read the Windows signature string
      - name: Generate Unified Manifest with Real Signatures
        env:
          APP_VER: ${{ needs.build-windows.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Safely extract local Linux signature
          LINUX_SIG=$(cat src-tauri/target/release/bundle/deb/*.sig src-tauri/target/release/bundle/appimage/*.sig 2>/dev/null | head -n 1 || echo "")
          
          # FIXED: Uses correct Bearer token authentication header to pull the Windows signature asset from GitHub's api
          WIN_URL=$(curl -sH "Authorization: Bearer $GH_TOKEN" "https://github.com{{ github.repository }}/releases/tags/v$APP_VER" | grep "browser_download_url" | grep ".msi.sig" | head -n 1 | tr -d ' ' | cut -d'"' -f4)
          
          if [ ! -z "$WIN_URL" ]; then
            WIN_SIG=$(curl -sLH "Authorization: Bearer $GH_TOKEN" "$WIN_URL")
          else
            WIN_SIG=""
          fi

          # Output clean JSON manifest file with verified signatures injected
          cat << EOF > updater.json
          {
            "version": "$APP_VER",
            "platforms": {
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com{APP_VER}_x64_en-US.msi"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "https://github.com{APP_VER}_amd64.deb"
              }
            }
          }
          EOF
