name: "Build Ubuntu App (DEB & AppImage)"
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-tauri-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm install --legacy-peer-deps
      - run: npm run build
        env:
          VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
          VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          tagName: v__VERSION__
          releaseName: "PharmaTRACK v__VERSION__"
          releaseBody: "Download the Windows .exe and Ubuntu .deb installers below."
          releaseDraft: false
          prerelease: false
